services:
  - type: web
    name: vlt-erp
    runtime: python
    buildCommand: |
      apt-get install -y g++ &&
      pip install -r requirements.txt &&
      python manage.py collectstatic --noinput --settings=config.settings.production &&
      python manage.py migrate --settings=config.settings.production
    startCommand: >
      gunicorn config.wsgi:application
      --workers 2
      --threads 2
      --worker-class gthread
      --timeout 120
      --bind 0.0.0.0:$PORT
      --log-level info
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        sync: false          # Render Dashboard dan kiriting
      - key: DATABASE_URL
        fromDatabase:
          name: vlt-erp-db
          property: connectionString
      - key: ANTHROPIC_API_KEY
        sync: false          # Render Dashboard dan kiriting (MAJBURIY)
      - key: VLT_AI_MODEL
        value: claude-haiku-4-5-20251001
      - key: VLT_AI_MAX_TOKENS
        value: "1024"
      - key: CLOUDINARY_CLOUD_NAME
        sync: false          # Render Dashboard dan kiriting
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: TIME_ZONE
        value: Asia/Tashkent
      - key: MONTHLY_FEE_DEFAULT
        value: "500000"
      - key: JWT_ACCESS_TOKEN_LIFETIME_MINUTES
        value: "60"
      - key: JWT_REFRESH_TOKEN_LIFETIME_DAYS
        value: "7"
    healthCheckPath: /admin/
    autoDeploy: true

databases:
  - name: vlt-erp-db
    databaseName: erp_db
    user: erp_user
    plan: free
